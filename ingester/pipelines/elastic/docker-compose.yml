# Local Elastic stack for Ventra export demos (free Basic license, dev use only).
# Usage: see demo.sh or README.md in this directory.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: ventra-elastic-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms768m -Xmx768m
      - cluster.name=ventra-elastic-demo
    ports:
      - "9200:9200"
    volumes:
      - ventra-elastic-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: ventra-elastic-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: ventra-elastic-logstash
    profiles:
      - ingest
    environment:
      - ELASTIC_HOSTS=http://elasticsearch:9200
      - VENTRA_NDJSON=${VENTRA_NDJSON:-/export/cloudtrail.ndjson}
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ../logstash:/ventra/logstash:ro
      - ${EXPORT_DIR:-./export}:/export:ro
    command:
      - /usr/share/logstash/bin/logstash
      - -f
      - /ventra/logstash/ventra-common.conf
      - -f
      - /ventra/logstash/ventra-unified.conf
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  ventra-elastic-es-data:
