# Shared Ventra → Elastic ECS mapping.
# Include from per-source pipelines: logstash -f ventra-common.conf -f cloudtrail.conf
#
# Expects NDJSON from: ventra-export --case-dir cases/<id> --out ./export

filter {
  # Normalize ventra metadata (export already nests ventra.*; keep flat fallbacks).
  if ![ventra][case_id] and [case_id] {
    mutate { rename => { "case_id" => "[ventra][case_id]" } }
  }
  if ![ventra][source] and [ventra_source] {
    mutate { rename => { "ventra_source" => "[ventra][source]" } }
  }
  if ![ventra][severity] and [event_severity] {
    mutate { rename => { "event_severity" => "[ventra][severity]" } }
  }

  if [timestamp] and ![@timestamp] {
    date { match => ["timestamp", "ISO8601"] target => "@timestamp" }
  }

  mutate {
    rename => {
      "event_action"     => "[event][action]"
      "event_outcome"    => "[event][outcome]"
      "event_kind"       => "[event][kind]"
      "event_provider"   => "[event][provider]"
      "user_name"        => "[user][name]"
      "user_id"          => "[user][id]"
      "user_arn"         => "[user][target][id]"
      "user_type"        => "[user][target][type]"
      "source_ip"        => "[source][ip]"
      "source_country"   => "[source][geo][country_iso_code]"
      "source_asn"       => "[source][as][number]"
      "dest_ip"          => "[destination][ip]"
      "dest_port"        => "[destination][port]"
      "dest_bytes"       => "[network][bytes]"
      "cloud_region"     => "[cloud][region]"
      "cloud_account"    => "[cloud][account][id]"
      "cloud_service"    => "[cloud][service][name]"
      "cloud_provider"   => "[cloud][provider]"
      "resource_type"    => "[ventra][resource][type]"
      "resource_id"      => "[ventra][resource][id]"
      "resource_arn"     => "[ventra][resource][arn]"
      "ua_original"      => "[user_agent][original]"
      "ua_category"      => "[ventra][user_agent][category]"
      "message"          => "[message]"
    }
  }

  if [event_category] and [event_category] =~ /^\[/ {
    json { source => "event_category" target => "[event][category]" remove_field => ["event_category"] }
  } else if [event_category] {
    mutate { rename => { "event_category" => "[event][category]" } }
  }

  if [related_ip] and [related_ip] =~ /^\[/ {
    json { source => "related_ip" target => "[ventra][related][ip]" remove_field => ["related_ip"] }
  }
  if [related_user] and [related_user] =~ /^\[/ {
    json { source => "related_user" target => "[ventra][related][user]" remove_field => ["related_user"] }
  }
  if [related_resource] and [related_resource] =~ /^\[/ {
    json { source => "related_resource" target => "[ventra][related][resource]" remove_field => ["related_resource"] }
  }

  mutate {
    add_field => { "[@metadata][index_prefix]" => "ventra" }
  }
}
