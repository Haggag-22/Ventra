# Ventra → Elastic SIEM (all normalized sources).
#
# Works with any NDJSON file produced by ventra-export. All sources share the same
# UnifiedEvent schema, so one pipeline covers CloudTrail, VPC flow, GuardDuty, Entra, etc.
#
#   ventra-ingest case.tar.zst --case-store ./cases
#   ventra-export --case-dir ./cases/<id> --out ./export
#   VENTRA_NDJSON=$PWD/export/cloudtrail.ndjson \
#   VENTRA_SOURCE=cloudtrail \
#   ELASTIC_HOSTS=https://es:9200 \
#     logstash -f ingester/pipelines/logstash/ventra-common.conf \
#              -f ingester/pipelines/logstash/ventra-unified.conf
#
# Repeat per source file, or point VENTRA_NDJSON at export/*.ndjson and ingest all.

input {
  file {
    path => "${VENTRA_NDJSON:/data/export/*.ndjson}"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS:https://localhost:9200}"]
    index => "${[@metadata][index_prefix]:ventra}-%{[ventra][source]:unknown}-%{+YYYY.MM.dd}"
    # Configure auth/TLS via environment in your deployment; never hardcode credentials.
  }
  # Uncomment for dry runs:
  # stdout { codec => rubydebug }
}
