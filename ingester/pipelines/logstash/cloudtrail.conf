# Harbor → Elastic SIEM forwarding (CloudTrail).
#
# Reuses Harbor's normalized output so the same evidence can land in a client's Elastic stack
# in addition to (or instead of) the Harbor console. Point this at the per-source JSON-lines
# extracted from an evidence package, or at the events.parquet exported to NDJSON.
#
#   harbor-ingest case.tar.zst --case-store ./cases
#   duckdb -c "COPY (SELECT * FROM 'cases/<id>/events.parquet' WHERE harbor_source='cloudtrail') \
#              TO 'cloudtrail.ndjson' (FORMAT JSON)"
#   logstash -f ingester/pipelines/logstash/cloudtrail.conf

input {
  file {
    path => "${HARBOR_NDJSON:/data/cloudtrail.ndjson}"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  # Harbor already normalized to an ECS-aligned shape; map the flat columns onto ECS fields.
  date { match => ["timestamp", "ISO8601"] target => "@timestamp" }

  mutate {
    rename => {
      "event_action"   => "[event][action]"
      "event_outcome"  => "[event][outcome]"
      "event_severity" => "[harbor][severity]"
      "user_name"      => "[user][name]"
      "user_arn"       => "[user][id]"
      "source_ip"      => "[source][ip]"
      "cloud_region"   => "[cloud][region]"
      "cloud_account"  => "[cloud][account][id]"
      "cloud_service"  => "[cloud][service][name]"
      "ua_original"    => "[user_agent][original]"
    }
    add_field => { "[event][kind]" => "event" "[cloud][provider]" => "aws" }
  }

  # event_category is stored as a JSON array string; parse it back.
  if [event_category] {
    json { source => "event_category" target => "[event][category]" remove_field => ["event_category"] }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS:https://localhost:9200}"]
    index => "harbor-cloudtrail-%{[cloud][account][id]}"
    # Configure auth/TLS via environment in your deployment; never hardcode credentials.
  }
  # Uncomment for dry runs:
  # stdout { codec => rubydebug }
}
