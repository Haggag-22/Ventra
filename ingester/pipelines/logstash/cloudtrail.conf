# Ventra → Elastic SIEM forwarding (CloudTrail).
#
# Prefer ventra-unified.conf for all sources. This file remains for deployments that
# index CloudTrail separately by account ID.
#
#   ventra-export --case-dir cases/<id> --out ./export
#   VENTRA_NDJSON=$PWD/export/cloudtrail.ndjson ELASTIC_HOSTS=https://es:9200 \
#     logstash -f ingester/pipelines/logstash/ventra-common.conf \
#              -f ingester/pipelines/logstash/cloudtrail.conf

input {
  file {
    path => "${VENTRA_NDJSON:/data/cloudtrail.ndjson}"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS:https://localhost:9200}"]
    index => "ventra-cloudtrail-%{[cloud][account][id]:unknown}-%{+YYYY.MM.dd}"
    # Configure auth/TLS via environment in your deployment; never hardcode credentials.
  }
  # Uncomment for dry runs:
  # stdout { codec => rubydebug }
}
