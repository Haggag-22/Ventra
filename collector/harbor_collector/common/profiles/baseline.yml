# Baseline profile — the default for an unknown incident.
# Tier 1 only: answers "who authenticated, what did they do, what changed, any exfil signal".
name: baseline
description: Always-on critical sources for any cloud IR triage.
collectors:
  - account        # account/org context + operator identity
  - cloudtrail     # control-plane activity, all enabled regions
  - vpc_flow       # flow log configuration + recent records
  - guardduty      # threat findings
  - waf            # web ACL configs + sampled requests
  - iam            # principals, keys, policies, credential report
  - sts            # AssumeRole activity (derived from CloudTrail)
