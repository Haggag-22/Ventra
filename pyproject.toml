[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ventra"
version = "0.1.0"
description = "Cloud forensic triage — read-only collector, ingester, and analyst console."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Ventra contributors" }]
keywords = ["dfir", "incident-response", "aws", "forensics", "cloud"]
dependencies = [
    "boto3>=1.34",
    "botocore>=1.34",
    "rich>=13.7",
]

[project.optional-dependencies]
zstd = ["zstandard>=0.22"]
console = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "duckdb>=0.10",
    "pyarrow>=15.0",
    "PyYAML>=6.0",
    "pydantic>=2.6",
    "python-multipart>=0.0.9",
]
dev = [
    "pytest>=8.0",
    "moto>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "duckdb>=0.10",
    "pyarrow>=15.0",
    "PyYAML>=6.0",
    "pydantic>=2.6",
    "python-multipart>=0.0.9",
]

[project.scripts]
ventra = "collector.cli:main"
ventra-collect = "collector.cli:main_legacy"

[tool.setuptools.packages.find]
where = ["."]
include = ["collector*"]
namespaces = true

[tool.ruff]
line-length = 110
target-version = "py311"
src = ["collector", "ingester", "console/backend", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
disallow_untyped_defs = true
