name: AWS.Identity.Secrets
aliases:
- secrets
- aws.secrets
cloud: aws
category: Identity
description: Secrets Manager metadata (never values), rotation, resource policies.
version: 1.0.0
collector: secrets
type: secrets
required_actions:
- secretsmanager:ListSecrets
- secretsmanager:DescribeSecret
parameters:
