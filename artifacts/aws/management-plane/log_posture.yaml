name: AWS.ManagementPlane.LogPosture
aliases:
- log_posture
- aws.log_posture
cloud: aws
category: ManagementPlane
description: 'Logging posture for sources without a Ventra log collector yet: OpenSearch,
  DynamoDB Streams, Network Firewall.'
version: 1.0.0
collector: log_posture
type: log_posture
required_actions:
- logs:DescribeLogGroups
- es:ListDomainNames
- es:DescribeDomain
- dynamodb:ListTables
- dynamodb:DescribeTable
- network-firewall:ListFirewalls
- network-firewall:DescribeLoggingConfiguration
parameters:
  since:
    type: datetime
    required: false
  until:
    type: datetime
    required: false
sources:
- type: log_posture
  format: json
severity: extended
implicit: true
estimated_volume: medium
