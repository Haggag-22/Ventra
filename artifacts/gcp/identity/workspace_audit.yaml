name: GCP.Identity.WorkspaceAudit
aliases:
- workspace_audit
- gcp.workspace_audit
cloud: gcp
category: Identity
description: Google Workspace group and directory audit events (when routed to Cloud
  Logging).
version: 1.0.0
collector: workspace_audit
type: workspace_audit
required_actions:
- logging.logEntries.list
parameters:
  since:
    type: datetime
    required: false
  until:
    type: datetime
    required: false
sources:
- type: workspace_audit
  format: json
severity: extended
estimated_volume: medium
