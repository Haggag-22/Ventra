name: GCP.Workloads.GkeAudit
aliases:
- gke_audit
- gcp.gke_audit
cloud: gcp
category: Workloads
description: GKE Kubernetes API-server audit logs from Cloud Logging.
version: 1.0.0
collector: gke_audit
type: gke_audit
required_actions:
- container.clusters.list
- logging.logEntries.list
parameters:
  since:
    type: datetime
    required: false
  until:
    type: datetime
    required: false
sources:
- type: gke_audit
  format: json
severity: critical
estimated_volume: medium
