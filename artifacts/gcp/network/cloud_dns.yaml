name: GCP.Network.CloudDns
aliases:
- cloud_dns
- gcp.cloud_dns
cloud: gcp
category: Network
description: Cloud DNS query and response logs from Cloud Logging.
version: 1.0.0
collector: cloud_dns
type: cloud_dns
required_actions:
- logging.logEntries.list
parameters:
  since:
    type: datetime
    required: false
  until:
    type: datetime
    required: false
sources:
- type: cloud_dns
  format: json
severity: extended
estimated_volume: medium
