# Publish the ventra package to PyPI via trusted publishing (OIDC).
#
# Setup on pypi.org → Publishing → Add a new pending publisher:
#   PyPI project name: ventra
#   Owner: Haggag-22   Repository: Ventra   Workflow: publish.yml   Environment: pypi
#
# Release:
#   git tag v0.1.0 && git push origin v0.1.0
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install .[dev] ./ingester[dev] ./console/backend
      - name: Read-only guard
        run: |
          python -m collector.tools.verify_readonly --collectors
          python -m collector.tools.verify_readonly docs/iam-policies/aws-collector-readonly.json
      - name: Tests
        run: python -m pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build ventra
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
