# Automatically publish ventra to PyPI on every push to main (after tests pass).
#
# PyPI trusted publisher (pypi.org → ventra → Publishing):
#   Owner: Haggag-22   Repository: Ventra   Workflow: publish.yml   Environment: pypi
#
# Bump version in pyproject.toml when you want a new release on PyPI.
# If the version is already published, the upload is skipped (no failure).
name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install .[dev] ./ingester[dev] ./console/backend
      - name: Read-only guard
        run: |
          python -m collector.tools.verify_readonly --collectors
          python -m collector.tools.verify_readonly docs/iam-policies/aws-collector-readonly.json
      - name: Tests
        run: python -m pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build ventra
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
